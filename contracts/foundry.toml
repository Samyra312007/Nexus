[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "paris"

fuzz.runs = 256
invariant.runs = 256
invariant.depth = 50

[rpc_endpoints]
somnia = "${SOMNIA_RPC_URL}"
localhost = "http://127.0.0.1:8545"

[etherscan]
somnia = { key = "${SOMNIA_API_KEY}" }
